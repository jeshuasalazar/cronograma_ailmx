<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>aiLearning — Panel de Operaciones · Tiempo Real</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#2D88E8; --blue-2:#4C9BF0; --blue-deep:#1A5FB4;
    --bg:#070E18; --bg-2:#0B1524;
    --glass:rgba(255,255,255,.045); --glass-2:rgba(255,255,255,.07);
    --stroke:rgba(255,255,255,.10); --stroke-2:rgba(255,255,255,.16);
    --txt:#EAF1FB; --txt-2:#AEBDD2; --mute:#6C7B92;
    --green:#3DD68C; --coral:#FF7A5C; --amber:#F5B841;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);background:var(--bg);min-height:100vh;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:
    radial-gradient(900px 600px at 12% -8%,rgba(45,136,232,.20),transparent 60%),
    radial-gradient(1000px 700px at 108% 8%,rgba(45,136,232,.12),transparent 55%),
    linear-gradient(180deg,#0A1322,#070E18 60%)}
  .display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em;font-weight:600}
  .mono{font-family:'JetBrains Mono',monospace}
  a{color:var(--blue-2);text-decoration:none} a:hover{color:var(--blue)}
  ::selection{background:var(--blue);color:#fff}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px;border:2px solid transparent;background-clip:content-box}

  .wrap{max-width:1340px;margin:0 auto;padding:22px 26px 60px}

  /* ── Top bar ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 20px;border:1px solid var(--stroke);border-radius:16px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);position:sticky;top:14px;z-index:40;box-shadow:0 18px 50px -30px rgba(0,0,0,.9)}
  .tb-l{display:flex;align-items:center;gap:16px;min-width:0}
  .tb-l img{height:26px;width:auto;object-fit:contain}
  .tb-sep{width:1px;height:26px;background:var(--stroke-2)}
  .tb-title{display:flex;flex-direction:column;gap:2px;min-width:0}
  .tb-title .k{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}
  .tb-title .v{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;letter-spacing:-0.01em;white-space:nowrap}
  .tb-r{display:flex;align-items:center;gap:14px}
  .live{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:rgba(61,214,140,.12);border:1px solid rgba(61,214,140,.32);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);font-weight:500}
  .live .beat{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(61,214,140,.6);animation:beat 1.8s infinite}
  @keyframes beat{0%{box-shadow:0 0 0 0 rgba(61,214,140,.55)}70%{box-shadow:0 0 0 10px rgba(61,214,140,0)}100%{box-shadow:0 0 0 0 rgba(61,214,140,0)}}
  .clock{text-align:right;line-height:1.15}
  .clock .t{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;letter-spacing:.02em}
  .clock .d{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}

  /* ── KPI strip ── */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
  .kpi{position:relative;border:1px solid var(--stroke);border-radius:16px;padding:18px 20px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);overflow:hidden}
  .kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--blue))}
  .kpi .top{display:flex;align-items:center;justify-content:space-between}
  .kpi .num{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:600;letter-spacing:-0.03em;line-height:1;color:var(--accent,var(--txt))}
  .kpi .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:color-mix(in oklab,var(--accent,var(--blue)) 16%,transparent);color:var(--accent,var(--blue))}
  .kpi .lab{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--txt-2);margin-top:12px}
  .kpi .trend{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);margin-top:5px}

  /* ── Layout ── */
  .layout{display:grid;grid-template-columns:1fr 348px;gap:18px;margin-top:18px;align-items:start}

  .panel{border:1px solid var(--stroke);border-radius:18px;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);overflow:hidden}
  .panel .head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;border-bottom:1px solid var(--stroke)}
  .panel .head h2{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:center;gap:9px}
  .panel .head .cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mute);letter-spacing:.06em}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--stroke)}
  .search{flex:1;min-width:180px;display:flex;align-items:center;gap:9px;padding:8px 13px;border:1px solid var(--stroke);border-radius:10px;background:rgba(0,0,0,.25)}
  .search svg{flex:none;color:var(--mute)}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13px}
  .search input::placeholder{color:var(--mute)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{cursor:pointer;user-select:none;padding:6px 12px;border-radius:999px;border:1px solid var(--stroke);background:transparent;color:var(--txt-2);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
  .chip:hover{border-color:var(--stroke-2);color:var(--txt)}
  .chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .chip.on.st-done{background:var(--green);border-color:var(--green);color:#06231a}
  .chip.on.st-prog{background:var(--blue);border-color:var(--blue)}
  .chip.on.st-wait{background:var(--coral);border-color:var(--coral);color:#2a0e07}

  .btn{cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;padding:8px 14px;border-radius:10px;border:1px solid var(--stroke);background:transparent;color:var(--txt);display:inline-flex;align-items:center;gap:7px;transition:all .15s}
  .btn:hover{border-color:var(--stroke-2);background:var(--glass-2)}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 10px 26px -12px var(--blue)}
  .btn.pri:hover{background:var(--blue-2)}

  /* Board */
  .board{padding:12px;display:flex;flex-direction:column;gap:10px;max-height:none}
  .task{border:1px solid var(--stroke);border-radius:14px;background:rgba(255,255,255,.025);overflow:hidden;transition:border-color .15s,background .15s}
  .task:hover{border-color:var(--stroke-2)}
  .task.open{border-color:color-mix(in oklab,var(--blue) 45%,var(--stroke))}
  .task-row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 16px;cursor:pointer}
  .daybadge{width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(45,136,232,.28),rgba(45,136,232,.08));border:1px solid rgba(45,136,232,.35);flex:none}
  .daybadge .dd{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;line-height:1;color:var(--blue-2)}
  .daybadge .mm{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;color:var(--mute);margin-top:2px}
  .t-main{min-width:0}
  .t-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:-0.01em;line-height:1.25;margin-bottom:7px;text-wrap:pretty}
  .t-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px}
  .front{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:6px;border:1px solid var(--stroke-2);color:var(--txt-2)}
  .front.f0{color:#7fc0ff;border-color:rgba(127,192,255,.3);background:rgba(127,192,255,.08)}
  .front.f1{color:#c3a6ff;border-color:rgba(195,166,255,.3);background:rgba(195,166,255,.08)}
  .front.f2{color:#7ee0b8;border-color:rgba(126,224,184,.3);background:rgba(126,224,184,.08)}
  .front.f3{color:#ffc27a;border-color:rgba(255,194,122,.3);background:rgba(255,194,122,.08)}
  .owner{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.03em;text-transform:uppercase;color:var(--txt-2);padding:3px 8px 3px 4px;border-radius:999px;border:1px solid var(--stroke)}
  .ava{width:16px;height:16px;border-radius:50%;display:grid;place-items:center;font-size:8px;font-weight:700;color:#04121f}
  .datetag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute)}
  .t-right{display:flex;align-items:center;gap:12px;flex:none}
  .ring{--p:0;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--rc,var(--blue)) calc(var(--p)*1%),rgba(255,255,255,.08) 0);position:relative}
  .ring::before{content:"";position:absolute;inset:4px;border-radius:50%;background:#0c1523}
  .ring span{position:relative;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:var(--txt)}
  .stat{position:relative;cursor:pointer;display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;white-space:nowrap;border:1px solid transparent}
  .stat .d{width:8px;height:8px;border-radius:50%}
  .stat.s-done{background:rgba(61,214,140,.13);color:var(--green);border-color:rgba(61,214,140,.3)} .stat.s-done .d{background:var(--green)}
  .stat.s-prog{background:rgba(45,136,232,.15);color:var(--blue-2);border-color:rgba(45,136,232,.32)} .stat.s-prog .d{background:var(--blue-2);animation:beat 1.8s infinite}
  .stat.s-wait{background:rgba(255,122,92,.13);color:var(--coral);border-color:rgba(255,122,92,.3)} .stat.s-wait .d{background:var(--coral)}
  .stat.s-todo{background:rgba(255,255,255,.05);color:var(--mute);border-color:var(--stroke)} .stat.s-todo .d{background:var(--mute)}
  .caret{color:var(--mute);transition:transform .2s}
  .task.open .caret{transform:rotate(180deg)}

  /* Task detail */
  .t-detail{display:none;padding:2px 16px 16px;border-top:1px solid var(--stroke)}
  .task.open .t-detail{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 0 4px}
  .dfield .fl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--mute);margin-bottom:6px}
  .dfield .fv{font-size:12.5px;line-height:1.5;color:var(--txt-2)}
  .notes{margin-top:6px;display:flex;flex-direction:column;gap:8px}
  .note{display:flex;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(0,0,0,.22);border:1px solid var(--stroke)}
  .note .nb{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);white-space:nowrap;padding-top:2px}
  .note .nt{font-size:12.5px;color:var(--txt);line-height:1.45}
  .addnote{display:flex;gap:8px;margin-top:10px}
  .addnote input{flex:1;background:rgba(0,0,0,.25);border:1px solid var(--stroke);border-radius:10px;padding:9px 12px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none}
  .addnote input:focus{border-color:var(--blue)}
  .prog-edit{display:flex;align-items:center;gap:12px;margin-top:4px}
  .prog-edit input[type=range]{flex:1;accent-color:var(--blue)}
  .prog-edit .pv{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--txt);width:42px;text-align:right}

  .empty-state{padding:48px 20px;text-align:center;color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em}

  /* ── Right column ── */
  .side{display:flex;flex-direction:column;gap:18px}
  .fronts{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
  .frow{display:flex;align-items:center;gap:12px}
  .frow .fname{flex:1;min-width:0}
  .frow .fname .n{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px}
  .frow .fname .s{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);letter-spacing:.05em;margin-top:2px}
  .frow .pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--txt);width:38px;text-align:right}
  .bar{height:7px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:8px}
  .bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue-deep),var(--blue-2));transition:width .5s cubic-bezier(.22,1,.36,1)}
  .fitem{border-bottom:1px solid var(--stroke);padding-bottom:14px}
  .fitem:last-child{border-bottom:none;padding-bottom:0}

  .team{padding:6px 8px}
  .tmember{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;transition:background .15s}
  .tmember:hover{background:var(--glass-2)}
  .tmember .av{position:relative;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#04121f;flex:none}
  .tmember .av .pres{position:absolute;right:-1px;bottom:-1px;width:12px;height:12px;border-radius:50%;border:2.5px solid #0c1523}
  .pres.on{background:var(--green)} .pres.off{background:var(--mute)}
  .tmember .info{flex:1;min-width:0}
  .tmember .info .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px}
  .tmember .info .rl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
  .tmember .load{text-align:right}
  .tmember .load .lv{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px}
  .tmember .load .ll{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--mute);letter-spacing:.06em;text-transform:uppercase}

  /* Feed */
  .feed{padding:6px 20px 18px;max-height:420px;overflow-y:auto}
  .fevent{position:relative;padding:12px 0 12px 22px;border-left:1px solid var(--stroke)}
  .fevent:last-child{border-left-color:transparent}
  .fevent::before{content:"";position:absolute;left:-4.5px;top:15px;width:9px;height:9px;border-radius:50%;background:var(--dotc,var(--blue));box-shadow:0 0 0 3px #0c1523}
  .fevent .txt{font-size:12.5px;line-height:1.45;color:var(--txt)}
  .fevent .txt b{font-weight:600;color:#fff}
  .fevent .when{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);letter-spacing:.05em;margin-top:4px}

  /* ── Modal ── */
  .overlay{position:fixed;inset:0;background:rgba(4,9,17,.72);backdrop-filter:blur(6px);z-index:80;display:none;align-items:center;justify-content:center;padding:24px}
  .overlay.show{display:flex}
  .modal{width:100%;max-width:520px;border:1px solid var(--stroke-2);border-radius:20px;background:linear-gradient(180deg,#0e1a2b,#0a1320);box-shadow:0 40px 90px -30px #000;overflow:hidden}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--stroke)}
  .modal .mh h3{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600}
  .modal .mb{padding:20px 22px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto}
  .modal .mf{padding:16px 22px;border-top:1px solid var(--stroke);display:flex;justify-content:flex-end;gap:10px}
  .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--mute);margin-bottom:7px}
  .field input,.field select,.field textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--stroke);border-radius:10px;padding:10px 13px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
  .field textarea{resize:vertical;min-height:64px}
  .frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .iconbtn{cursor:pointer;width:32px;height:32px;border-radius:9px;border:1px solid var(--stroke);background:transparent;color:var(--txt-2);display:grid;place-items:center}
  .iconbtn:hover{background:var(--glass-2);color:var(--txt)}

  /* status popover */
  .pop{position:absolute;top:calc(100% + 6px);right:0;z-index:30;min-width:168px;padding:6px;border:1px solid var(--stroke-2);border-radius:12px;background:#0e1a2b;box-shadow:0 24px 60px -20px #000;display:none;flex-direction:column;gap:2px}
  .pop.show{display:flex}
  .pop button{cursor:pointer;text-align:left;background:none;border:none;padding:9px 11px;border-radius:8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
  .pop button:hover{background:var(--glass-2)}
  .pop button .d{width:8px;height:8px;border-radius:50%}

  .foot{margin-top:26px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--mute);text-transform:uppercase;padding-top:18px;border-top:1px solid var(--stroke)}

  @media (max-width:1080px){ .layout{grid-template-columns:1fr} .kpis{grid-template-columns:1fr 1fr} }
  @media (max-width:640px){
    .wrap{padding:16px 14px 44px}
    .topbar{flex-direction:column;align-items:flex-start;gap:12px;position:static}
    .kpis{grid-template-columns:1fr 1fr;gap:10px}
    .kpi .num{font-size:30px}
    .t-right{flex-direction:column;align-items:flex-end;gap:8px}
    .dgrid,.frow2{grid-template-columns:1fr}
    .toolbar{gap:8px}
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- Top bar -->
  <div class="topbar">
    <div class="tb-l">
      <img src="assets/logo-white.png" alt="aiLearning" />
      <div class="tb-sep"></div>
      <div class="tb-title">
        <span class="k">Panel de administración</span>
        <span class="v">Operaciones en tiempo real</span>
      </div>
    </div>
    <div class="tb-r">
      <span class="live"><span class="beat"></span>En vivo</span>
      <div class="clock"><div class="t" id="clk-t">--:--:--</div><div class="d" id="clk-d">—</div></div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpis" id="kpis"></div>

  <!-- Layout -->
  <div class="layout">
    <!-- Board -->
    <div class="panel">
      <div class="head">
        <h2>Tablero de actividades</h2>
        <span class="cnt" id="board-cnt"></span>
      </div>
      <div class="toolbar">
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="q" type="text" placeholder="Buscar actividad, frente o responsable…" />
        </div>
        <button class="btn pri" id="add-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
          Nueva actividad
        </button>
      </div>
      <div class="toolbar" style="border-bottom:1px solid var(--stroke);gap:14px">
        <div class="chips" id="owner-chips"></div>
        <div class="chips" id="status-chips" style="margin-left:auto"></div>
      </div>
      <div class="board" id="board"></div>
    </div>

    <!-- Right -->
    <div class="side">
      <div class="panel">
        <div class="head"><h2>Avance por frente</h2></div>
        <div class="fronts" id="fronts"></div>
      </div>
      <div class="panel">
        <div class="head"><h2>Equipo</h2><span class="cnt" id="team-online"></span></div>
        <div class="team" id="team"></div>
      </div>
      <div class="panel">
        <div class="head">
          <h2><span class="beat" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green)"></span>Actividad reciente</h2>
          <span class="cnt" id="feed-cnt"></span>
        </div>
        <div class="feed" id="feed"></div>
      </div>
    </div>
  </div>

  <div class="foot">
    <span>aiLearning® · Panel interno de operaciones</span>
    <span id="last-sync">Sincronizado —</span>
  </div>
</div>

<!-- Modal: nueva/editar actividad -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mh">
      <h3 id="modal-title">Nueva actividad</h3>
      <button class="iconbtn" id="modal-close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="mb">
      <div class="field"><label>Título de la actividad</label><input id="f-title" type="text" placeholder="Ej. Reunión con aliado estratégico" /></div>
      <div class="frow2">
        <div class="field"><label>Frente</label><select id="f-front"></select></div>
        <div class="field"><label>Responsable</label><select id="f-owner"></select></div>
      </div>
      <div class="frow2">
        <div class="field"><label>Día</label><input id="f-day" type="number" min="1" max="31" placeholder="15" /></div>
        <div class="field"><label>Rango de fechas</label><input id="f-date" type="text" placeholder="15 – 18 JUL 2026" /></div>
      </div>
      <div class="field"><label>Tareas principales</label><textarea id="f-task" placeholder="Describe las tareas clave…"></textarea></div>
      <div class="frow2">
        <div class="field"><label>Tiempo estimado</label><input id="f-time" type="text" placeholder="Una semana" /></div>
        <div class="field"><label>Estado</label><select id="f-status">
          <option value="todo">Pendiente</option><option value="prog">En proceso</option><option value="wait">En espera / Riesgo</option><option value="done">Completado</option>
        </select></div>
      </div>
      <div class="field"><label>Materiales necesarios</label><input id="f-mat" type="text" placeholder="Temario, documentos, etc." /></div>
    </div>
    <div class="mf">
      <button class="btn" id="modal-delete" style="margin-right:auto;display:none;color:var(--coral);border-color:rgba(255,122,92,.3)">Eliminar</button>
      <button class="btn" id="modal-cancel">Cancelar</button>
      <button class="btn pri" id="modal-save">Guardar</button>
    </div>
  </div>
</div>

<script>
const FRONTS=[
  {id:0,name:"Capacitaciones",tag:"Formación & temario"},
  {id:1,name:"Alianzas",tag:"Convenios & partners"},
  {id:2,name:"Banca",tag:"Cuentas & apertura"},
  {id:3,name:"Plataforma",tag:"Producto & lanzamiento"}
];
const TEAM=[
  {id:"blake",name:"CP Blake",role:"Dirección & alianzas",color:"#4C9BF0",online:true},
  {id:"roberto",name:"CP Roberto",role:"Capacitación & contenido",color:"#3DD68C",online:true},
  {id:"jhua",name:"JHUA",role:"Plataforma & banca",color:"#F5B841",online:false}
];
const STATUS={
  done:{label:"Completado",cls:"s-done",color:"#3DD68C",p:100},
  prog:{label:"En proceso",cls:"s-prog",color:"#4C9BF0",p:55},
  wait:{label:"En espera",cls:"s-wait",color:"#FF7A5C",p:30},
  todo:{label:"Pendiente",cls:"s-todo",color:"#6C7B92",p:0}
};
const SEED=[
  {id:"a1",day:1,date:"01 – 07 JUL 2026",title:"Conseguir dar capacitaciones",front:0,owners:["blake","roberto"],task:"Convencer a CP Herrera. Desarrollar temario y días de la capacitación.",time:"Una semana",mat:"Desarrollo del temario y calendario.",status:"done",prog:100,notes:[{t:"Ya se entregó temario, desarrollo y días.",by:"roberto",ts:daysAgo(9)}]},
  {id:"a2",day:3,date:"03 – 13 JUL 2026",title:"Recuperar la cuenta de BBVA",front:2,owners:["jhua"],task:"Ir al banco y dar seguimiento al caso.",time:"Una semana",mat:"—",status:"prog",prog:50,notes:[{t:"Se acudió 2 veces; se mantiene contacto con BBVA.",by:"jhua",ts:daysAgo(4)},{t:"Esperamos respuesta del banco.",by:"jhua",ts:daysAgo(1)}]},
  {id:"a3",day:5,date:"05 – 20 JUL 2026",title:"Santander — opción de apertura",front:2,owners:["blake"],task:"Se revisaron los requisitos necesarios para la apertura.",time:"10 – 15 días",mat:"Inversión mínima $15,000 MXN por 3 meses.",status:"wait",prog:30,notes:[{t:"Se espera que la resolución de BBVA sea favorable antes de avanzar.",by:"blake",ts:daysAgo(3)}]},
  {id:"a4",day:7,date:"07 – 15 JUL 2026",title:"Página aiLearning para el evento LUMBRERA",front:3,owners:["jhua"],task:"Estructurar la página lo más accesible posible y probarla con la capacitación de Lumbrera.",time:"Avance o entrega final",mat:"—",status:"done",prog:90,notes:[{t:"Ya es posible entrar desde celular y computadora. Avance validado.",by:"jhua",ts:daysAgo(6)}]},
  {id:"a5",day:9,date:"09 – 10 JUL 2026",title:"AMCP — reunión con el presidente Daniel",front:1,owners:["blake","roberto"],task:"Enviar desde el correo de aiLearning: programa, temario, horas y documentos necesarios.",time:"2 días",mat:"Desarrollo del temario y calendario.",status:"prog",prog:45,notes:[]},
  {id:"a6",day:10,date:"10 JUL 2026",title:"Reunión con CP Herrera",front:1,owners:["roberto"],task:"Concretar alianza y habilitar el uso de la plataforma de aiLearning.",time:"1 día",mat:"Página ya disponible.",status:"prog",prog:60,notes:[{t:"Página lista para la demostración.",by:"roberto",ts:daysAgo(2)}]},
  {id:"a7",day:11,date:"12 – 15 JUL 2026",title:"SUSY de CONTPAQ — reintentar contacto",front:1,owners:["blake"],task:"Mantener contacto para explorar posibles alianzas. Insistir.",time:"Seguimiento",mat:"Se envió el resumen de la plática y/o curso.",status:"wait",prog:25,notes:[{t:"Susy comenta que espera respuesta de sus desarrolladoras.",by:"blake",ts:daysAgo(2)}]},
  {id:"a8",day:12,date:"12 JUL 2026",title:"Retroalimentación de la grabación",front:3,owners:["roberto"],task:"Observaciones, sugerencias y cambios sobre la reunión anterior.",time:"1 día",mat:"Grabación de la reunión.",status:"todo",prog:0,notes:[]}
];

function daysAgo(d){return Date.now()-d*86400000;}
const KEY="ail_ops_v2";
let state=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.acts)return s;}catch(e){}
  return {acts:JSON.parse(JSON.stringify(SEED)),feed:[{txt:"Panel inicializado con el cronograma de julio.",ts:daysAgo(9),dot:"#4C9BF0"}]};}
function save(){state.lastSync=Date.now();localStorage.setItem(KEY,JSON.stringify(state));}

let filter={owner:"all",status:"all",q:""};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const memberById=id=>TEAM.find(m=>m.id===id);
const initials=n=>n.replace(/[^A-Za-z ]/g,"").trim().split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase()||n.slice(0,2).toUpperCase();

function rel(ts){const s=(Date.now()-ts)/1000;
  if(s<60)return"ahora";if(s<3600)return`hace ${Math.floor(s/60)} min`;
  if(s<86400)return`hace ${Math.floor(s/3600)} h`;const d=Math.floor(s/86400);
  return d===1?"ayer":`hace ${d} días`;}

function logEvent(txt,dot){state.feed.unshift({txt,ts:Date.now(),dot:dot||"#4C9BF0"});if(state.feed.length>40)state.feed.pop();}

/* ── KPIs ── */
function renderKPIs(){
  const a=state.acts;
  const done=a.filter(x=>x.status==="done").length;
  const prog=a.filter(x=>x.status==="prog").length;
  const wait=a.filter(x=>x.status==="wait").length;
  const overall=Math.round(a.reduce((s,x)=>s+(x.prog||0),0)/a.length);
  const data=[
    {n:overall+"%",l:"Avance global",t:a.length+" actividades en curso",c:"var(--blue)",ic:'<path d="M3 3v18h18"/><path d="m7 14 3-3 3 3 4-5"/>'},
    {n:done,l:"Avances confirmados",t:"Completados / validados",c:"var(--green)",ic:'<path d="M20 6 9 17l-5-5"/>'},
    {n:prog,l:"En proceso",t:"Con seguimiento activo",c:"var(--blue-2)",ic:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
    {n:wait,l:"En espera / riesgo",t:"Requieren atención",c:"var(--coral)",ic:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 2 18a2 2 0 0 0 1.7 3h16.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>'}
  ];
  $("#kpis").innerHTML=data.map(d=>`<div class="kpi" style="--accent:${d.c}">
    <div class="top"><div class="num">${d.n}</div>
    <div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${d.ic}</svg></div></div>
    <div class="lab">${d.l}</div><div class="trend">${d.t}</div></div>`).join("");
}

/* ── Filters ── */
function renderChips(){
  const oc=$("#owner-chips");
  oc.innerHTML=`<button class="chip ${filter.owner==='all'?'on':''}" data-o="all">Todos</button>`+
    TEAM.map(m=>`<button class="chip ${filter.owner===m.id?'on':''}" data-o="${m.id}">${m.name}</button>`).join("");
  oc.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{filter.owner=b.dataset.o;render();});
  const sc=$("#status-chips");
  const sts=[["all","Todos",""],["prog","En proceso","st-prog"],["wait","En espera","st-wait"],["done","Completado","st-done"]];
  sc.innerHTML=sts.map(([v,l,c])=>`<button class="chip ${c} ${filter.status===v?'on':''}" data-s="${v}">${l}</button>`).join("");
  sc.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{filter.status=b.dataset.s;render();});
}

/* ── Board ── */
function filtered(){
  const q=filter.q.toLowerCase();
  return state.acts.filter(a=>{
    if(filter.owner!=="all"&&!a.owners.includes(filter.owner))return false;
    if(filter.status!=="all"&&a.status!==filter.status)return false;
    if(q){const hay=(a.title+" "+FRONTS[a.front].name+" "+a.owners.map(o=>memberById(o).name).join(" ")+" "+a.task).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  }).sort((x,y)=>x.day-y.day);
}
function ownerHTML(id){const m=memberById(id);return `<span class="owner"><span class="ava" style="background:${m.color}">${initials(m.name)}</span>${m.name}</span>`;}

function render(){
  renderKPIs();renderChips();renderFronts();renderTeam();renderFeed();
  const list=filtered();
  $("#board-cnt").textContent=`${list.length} de ${state.acts.length}`;
  const b=$("#board");
  if(!list.length){b.innerHTML=`<div class="empty-state">Sin actividades para este filtro.</div>`;return;}
  b.innerHTML=list.map(a=>{
    const st=STATUS[a.status];const openCls=state.open===a.id?"open":"";
    return `<div class="task ${openCls}" data-id="${a.id}">
      <div class="task-row" data-toggle="${a.id}">
        <div class="daybadge"><span class="dd">${a.day}</span><span class="mm">JUL</span></div>
        <div class="t-main">
          <div class="t-title">${esc(a.title)}</div>
          <div class="t-meta">
            <span class="front f${a.front}">${FRONTS[a.front].name}</span>
            ${a.owners.map(ownerHTML).join("")}
            <span class="datetag">${a.date}</span>
          </div>
        </div>
        <div class="t-right">
          <div class="ring" style="--p:${a.prog};--rc:${st.color}"><span>${a.prog}</span></div>
          <div style="position:relative">
            <button class="stat ${st.cls}" data-stat="${a.id}"><span class="d"></span>${st.label}
              <svg class="caret" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m6 9 6 6 6-6"/></svg></button>
            <div class="pop" id="pop-${a.id}">${Object.entries(STATUS).map(([k,v])=>`<button data-set="${a.id}|${k}"><span class="d" style="background:${v.color}"></span>${v.label}</button>`).join("")}</div>
          </div>
        </div>
      </div>
      <div class="t-detail">
        <div class="dgrid">
          <div class="dfield"><div class="fl">Tareas principales</div><div class="fv">${esc(a.task)}</div></div>
          <div class="dfield"><div class="fl">Tiempo estimado</div><div class="fv">${esc(a.time)}</div>
            <div class="fl" style="margin-top:12px">Materiales</div><div class="fv">${esc(a.mat)}</div></div>
        </div>
        <div class="dfield" style="margin-top:4px"><div class="fl">Avance</div>
          <div class="prog-edit"><input type="range" min="0" max="100" step="5" value="${a.prog}" data-prog="${a.id}"><span class="pv">${a.prog}%</span></div></div>
        <div class="dfield" style="margin-top:14px">
          <div class="fl">Notas de seguimiento <button class="iconbtn" style="width:24px;height:24px;display:inline-grid;vertical-align:middle;margin-left:6px" data-edit="${a.id}" title="Editar actividad"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button></div>
          <div class="notes">${a.notes.length?a.notes.map(n=>`<div class="note"><span class="nb">${rel(n.ts)} · ${memberById(n.by)?memberById(n.by).name:n.by}</span><span class="nt">${esc(n.t)}</span></div>`).join(""):'<div class="fv" style="color:var(--mute)">Sin notas todavía.</div>'}</div>
          <div class="addnote"><input type="text" placeholder="Añadir nota de seguimiento…" data-note="${a.id}"><button class="btn pri" data-noteadd="${a.id}">Añadir</button></div>
        </div>
      </div>
    </div>`;
  }).join("");
  bindBoard();
}
function esc(s){return(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function bindBoard(){
  $$("[data-toggle]").forEach(el=>el.onclick=e=>{
    if(e.target.closest(".stat")||e.target.closest(".pop"))return;
    const id=el.dataset.toggle;state.open=state.open===id?null:id;save();render();
  });
  $$("[data-stat]").forEach(b=>b.onclick=e=>{e.stopPropagation();
    const pop=$("#pop-"+b.dataset.stat);const wasOpen=pop.classList.contains("show");
    $$(".pop").forEach(p=>p.classList.remove("show"));if(!wasOpen)pop.classList.add("show");});
  $$("[data-set]").forEach(b=>b.onclick=e=>{e.stopPropagation();
    const [id,k]=b.dataset.set.split("|");setStatus(id,k);});
  $$("[data-prog]").forEach(r=>{r.oninput=e=>{e.stopPropagation();r.nextElementSibling.textContent=r.value+"%";};
    r.onchange=e=>{e.stopPropagation();setProg(r.dataset.prog,+r.value);};r.onclick=e=>e.stopPropagation();});
  $$("[data-noteadd]").forEach(b=>b.onclick=e=>{e.stopPropagation();addNote(b.dataset.noteadd);});
  $$("[data-note]").forEach(i=>i.onkeydown=e=>{if(e.key==="Enter")addNote(i.dataset.note);});
  $$("[data-edit]").forEach(b=>b.onclick=e=>{e.stopPropagation();openModal(b.dataset.edit);});
}
document.addEventListener("click",e=>{if(!e.target.closest(".stat")&&!e.target.closest(".pop"))$$(".pop").forEach(p=>p.classList.remove("show"));});

function setStatus(id,k){const a=state.acts.find(x=>x.id===id);if(!a||a.status===k)return;
  const old=STATUS[a.status].label;a.status=k;
  if(k==="done")a.prog=100;else if(k==="todo")a.prog=0;else if(a.prog===0||a.prog===100)a.prog=STATUS[k].p;
  logEvent(`<b>${esc(a.title)}</b> cambió de ${old} a <b>${STATUS[k].label}</b>.`,STATUS[k].color);
  save();render();flashSync();}
function setProg(id,v){const a=state.acts.find(x=>x.id===id);if(!a)return;a.prog=v;
  if(v===100&&a.status!=="done"){a.status="done";logEvent(`<b>${esc(a.title)}</b> alcanzó el 100% y se marcó como <b>Completado</b>.`,STATUS.done.color);}
  else if(v>0&&v<100&&a.status==="todo"){a.status="prog";}
  save();render();flashSync();}
function addNote(id){const inp=document.querySelector(`[data-note="${id}"]`);const v=inp.value.trim();if(!v)return;
  const a=state.acts.find(x=>x.id===id);const who=a.owners[0]||"blake";
  a.notes.push({t:v,by:who,ts:Date.now()});
  logEvent(`Nueva nota en <b>${esc(a.title)}</b>: “${esc(v.slice(0,60))}${v.length>60?"…":""}”`,"#4C9BF0");
  save();render();flashSync();}

/* ── Fronts ── */
function renderFronts(){
  $("#fronts").innerHTML=FRONTS.map(f=>{
    const items=state.acts.filter(a=>a.front===f.id);
    const p=items.length?Math.round(items.reduce((s,x)=>s+x.prog,0)/items.length):0;
    return `<div class="fitem"><div class="frow"><div class="fname"><div class="n">${f.name}</div><div class="s">${items.length} actividad${items.length!==1?"es":""} · ${f.tag}</div></div><div class="pct">${p}%</div></div><div class="bar"><i style="width:${p}%"></i></div></div>`;
  }).join("");
}

/* ── Team ── */
function renderTeam(){
  $("#team-online").textContent=TEAM.filter(m=>m.online).length+" en línea";
  $("#team").innerHTML=TEAM.map(m=>{
    const load=state.acts.filter(a=>a.owners.includes(m.id)&&a.status!=="done").length;
    return `<div class="tmember"><div class="av" style="background:${m.color}">${initials(m.name)}<span class="pres ${m.online?'on':'off'}"></span></div>
      <div class="info"><div class="nm">${m.name}</div><div class="rl">${m.role}</div></div>
      <div class="load"><div class="lv">${load}</div><div class="ll">activas</div></div></div>`;
  }).join("");
}

/* ── Feed ── */
function renderFeed(){
  $("#feed-cnt").textContent=state.feed.length+" eventos";
  $("#feed").innerHTML=state.feed.map(f=>`<div class="fevent" style="--dotc:${f.dot}"><div class="txt">${f.txt}</div><div class="when">${rel(f.ts)}</div></div>`).join("");
}

/* ── Modal ── */
let editingId=null;
function fillSelects(){
  $("#f-front").innerHTML=FRONTS.map(f=>`<option value="${f.id}">${f.name}</option>`).join("");
  $("#f-owner").innerHTML=TEAM.map(m=>`<option value="${m.id}">${m.name}</option>`).join("");
}
function openModal(id){
  editingId=id||null;
  $("#modal-title").textContent=id?"Editar actividad":"Nueva actividad";
  $("#modal-delete").style.display=id?"inline-flex":"none";
  const a=id?state.acts.find(x=>x.id===id):null;
  $("#f-title").value=a?a.title:"";
  $("#f-front").value=a?a.front:0;
  $("#f-owner").value=a?a.owners[0]:"blake";
  $("#f-day").value=a?a.day:"";
  $("#f-date").value=a?a.date:"";
  $("#f-task").value=a?a.task:"";
  $("#f-time").value=a?a.time:"";
  $("#f-status").value=a?a.status:"todo";
  $("#f-mat").value=a?a.mat:"";
  $("#overlay").classList.add("show");
}
function closeModal(){$("#overlay").classList.remove("show");editingId=null;}
function saveModal(){
  const title=$("#f-title").value.trim();if(!title){$("#f-title").focus();return;}
  const data={title,front:+$("#f-front").value,owners:[$("#f-owner").value],day:+($("#f-day").value||1),
    date:$("#f-date").value.trim()||"—",task:$("#f-task").value.trim()||"—",time:$("#f-time").value.trim()||"—",
    status:$("#f-status").value,mat:$("#f-mat").value.trim()||"—"};
  if(editingId){const a=state.acts.find(x=>x.id===editingId);Object.assign(a,data);
    if(a.status==="done")a.prog=100;else if(a.status==="todo"&&a.prog===0){}else if(a.prog===0)a.prog=STATUS[a.status].p;
    logEvent(`Se actualizó la actividad <b>${esc(title)}</b>.`,"#4C9BF0");}
  else{const na={id:"a"+Date.now(),prog:STATUS[data.status].p,notes:[],...data};state.acts.push(na);state.open=na.id;
    logEvent(`Se creó la actividad <b>${esc(title)}</b> en <b>${FRONTS[data.front].name}</b>.`,"#3DD68C");}
  save();closeModal();render();flashSync();
}
function deleteAct(){if(!editingId)return;const a=state.acts.find(x=>x.id===editingId);
  if(!confirm("¿Eliminar esta actividad?"))return;
  state.acts=state.acts.filter(x=>x.id!==editingId);logEvent(`Se eliminó la actividad <b>${esc(a.title)}</b>.`,"#FF7A5C");
  save();closeModal();render();flashSync();}

$("#add-btn").onclick=()=>openModal(null);
$("#modal-close").onclick=closeModal;$("#modal-cancel").onclick=closeModal;
$("#modal-save").onclick=saveModal;$("#modal-delete").onclick=deleteAct;
$("#overlay").onclick=e=>{if(e.target===$("#overlay"))closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
$("#q").oninput=e=>{filter.q=e.target.value;render();};

/* ── Clock / sync ── */
const MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS=["dom","lun","mar","mié","jue","vie","sáb"];
function tick(){const d=new Date();
  $("#clk-t").textContent=d.toLocaleTimeString("es-MX",{hour12:false});
  $("#clk-d").textContent=`${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;}
function flashSync(){$("#last-sync").textContent="Sincronizado ahora";}
function refreshRel(){$("#last-sync").textContent="Sincronizado "+(state.lastSync?rel(state.lastSync):"—");
  renderFeed();$$(".note .nb").forEach(()=>{});}
setInterval(tick,1000);tick();
setInterval(refreshRel,20000);
fillSelects();render();flashSync();
</script>
</body>
</html>
